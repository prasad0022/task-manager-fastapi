version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: task-manager-api

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  postgres_data:
